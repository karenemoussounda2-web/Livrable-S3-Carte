<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" >
    <meta name="viewport" content="width=device-width, initial-scale=1.0" >
    <title>Carte</title>
    <link rel="stylesheet" href="styleC.css" >
  </head>
  <body>
    <h1>Carte produit</h1>
    <section class="carte">
      
      <article>
        <h2>Drone Professionnel K10 Max</h2>
        <img src="image drone.avif" alt="Carte" />
      </article>
      <aside>
        <section class="info">
          <h3 id="prix">50 000 FCFA</h3>
          <p>
            Drone Professionnel K10 Max à meilleur Prix, évitemant d'obstacles,
            trois caméras, vol stationnaire à Flux Optique , longue distance,...
          </p>

          <label for="nombre">Nombre d'article:</label>
          <input type="number" id="nombre" name="nombre" min="1" max="1000" >
          <button id="ajouter">Ajouter au panier</button>
        </section>
      </aside>
    </section>
  </body>
</html>
